type: edu
custom_name: Find more appropriate files for classes
files:
  - name: tests/test.py
    visible: false
    propagatable: false
  - name: src/main.py
    visible: true
    placeholders:
      - offset: 0
        length: 180
        placeholder_text: |-
          # TODO
          class Car:
              def __init__(self, gears_number: int) -> None:
                  self._gears_number = gears_number
                  self.engine_started = False
                  self._gear = 0
          
              @property
              def gear(self) -> int:
                  return self._gear
          
              @gear.setter
              def gear(self, value: int) -> None:
                  if value > self._gears_number or value < 0:
                      raise RuntimeError("Invalid gear")
                  self._gear = value
          
          
          class Driver:
              def __init__(self, car: Car) -> None:
                  self._car = car
          
              def _start(self) -> None:
                  self._car.engine_started = True
                  self._car.gear = 1
          
              def _stop(self) -> None:
                  self._car.gear = 0
                  self._car.engine_started = False
          
              def change_car(self, car: Car) -> None:
                  self._car = car
          
              def _driving(self, destination: str) -> None:
                  print(f"The driver is coming to {destination}")
          
              def drive_to(self, destination: str) -> None:
                  print("Start driving")
                  self._start()
                  self._driving(destination)
                  self._stop()
                  print("Arrived at destination")
          
          def main() -> None:
              car = Car(5)
              driver = Driver(car)
              driver.drive_to("Belgrade")
          
          if __name__ == "__main__":
              main()
  - name: src/driver.py
    visible: true
    placeholders:
      - offset: 0
        length: 675
        placeholder_text: "# TODO"
  - name: src/car.py
    visible: true
    placeholders:
      - offset: 0
        length: 415
        placeholder_text: "# TODO"
