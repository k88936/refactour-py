type: edu
custom_name: Inline methods and variables
files:
  - name: tests/test.py
    visible: false
  - name: src/task.py
    visible: true
    placeholders:
      - offset: 60
        length: 234
        placeholder_text: |-
            def calculate_total_price(product_price: List[int]) -> Optional[int]:
               try:
                 total_price = sum(product_price)
                 return total_price
               except Exception as error:
                 log_error(error, "Exception.txt")
                 return None

            def log_error(error: Exception, file_path: str) -> None:
               with open(file_path, 'w', encoding='utf-8') as f:
                 f.write(str(error))
